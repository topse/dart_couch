name: dart_couch
description: "A Dart binding for CouchDB with offline first capabilities, with ideas from PouchDB which I loved very much in the JS world."
version: 0.9.20+1
homepage:

environment:
  sdk: ^3.10.0

dependencies:
  drift: ^2.32.0
  http: ^1.4.0
  logging: ^1.3.0
  sqlite3: ^3.2.0
  crypto: ^3.0.6
  dart_mappable: ^4.7.0
  uuid: ^4.5.1
  mime: ^2.0.0
  collection: ^1.19.1
  path: ^1.9.1
  mutex: ^3.1.0
  async_queue: ^2.0.2
  meta: ^1.16.0
  ffi: ^2.1.4
  web: ^1.1.0

dev_dependencies:
  build_runner: ^2.13.0
  drift_dev: ^2.32.0
  lints: ^6.0.0
  dart_mappable_builder: ^4.7.0
  test: ^1.26.2
  flutter_lints: ^6.0.0
